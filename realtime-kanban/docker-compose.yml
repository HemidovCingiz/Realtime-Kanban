version: '3.8'

services:
  postgres_db:
    image: postgres:15-alpine
    container_name: kanban_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: kanban
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: kanban_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password123@postgres_db:5432/kanban
    depends_on:
      - postgres_db

  frontend:
    build: ./frontend
    container_name: kanban_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data: